services:
  pocketbase:
    build:
      context: .
      dockerfile: ./pocketbase.Dockerfile
      args:
        - PB_VERSION=0.39.3
    container_name: pocketbase
    restart: unless-stopped
    volumes:
      - ./pb_data:/app/pb_data
      - ./pb_migrations:/app/pb_migrations
    env_file:
      - .env
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    # наружу не торчит, доступ только через caddy или ssh-туннель
    ports:
      - "127.0.0.1:8090:8090"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - pocketbase

volumes:
  caddy_data:
  caddy_config:
